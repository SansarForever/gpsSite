<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jujutsu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#000;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .container{
      text-align:center;
      width:90%;
    }

    .logo{
      font-size:90px;
      font-weight:900;
      color:#ff0000;
      text-shadow:
        0 0 5px #ff0000,
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 80px #ff0000;
      margin-bottom:40px;
      letter-spacing:4px;
    }

    .loading-text{
      font-size:22px;
      margin-bottom:15px;
      color:#ddd;
    }

    .bar{
      width:450px;
      max-width:90%;
      height:22px;
      border:2px solid #ff0000;
      margin:auto;
      overflow:hidden;
      border-radius:10px;
      box-shadow:0 0 20px #ff0000;
      background:#111;
    }

    .progress{
      width:0%;
      height:100%;
      background:#ff0000;
      box-shadow:0 0 20px #ff0000;
      transition:width 0.2s linear;
    }

    .percent{
      margin-top:12px;
      font-size:20px;
      color:#ff4d4d;
      font-weight:bold;
    }

    .fake-status{
      margin-top:35px;
      font-size:16px;
      color:#888;
      min-height:25px;
      animation:blink 1.2s infinite;
    }

    @keyframes blink{
      0%{opacity:0.5;}
      50%{opacity:1;}
      100%{opacity:0.5;}
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">𝖀𝖒𝖚𝖙</div>

    <div class="loading-text">Yükleniyor...</div>

    <div class="bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <div class="fake-status" id="status">
      Sunucuya bağlanılıyor...
    </div>
  </div>

  <script>
    let progress = 0;

    const progressBar = document.getElementById("progress");
    const percentText = document.getElementById("percent");
    const statusText = document.getElementById("status");

    const fakeMessages = [
      "Sunucuya bağlanılıyor...",
      "Veriler doğrulanıyor...",
      "Sistem hazırlanıyor...",
      "Güvenli bağlantı kuruluyor...",
      "Paketler indiriliyor...",
      "Sinyal güçlendiriliyor...",
      "Bellek optimizasyonu yapılıyor...",
      "Veritabanı el sıkışması bekleniyor..."
    ];

    setInterval(() => {
      if (progress < 96) {
        progress += Math.random() * 1.5;

        if (progress > 96) progress = 96;

        progressBar.style.width = progress + "%";
        percentText.innerText = Math.floor(progress) + "%";
      }
    }, 400);

    setInterval(() => {
      const randomMessage =
        fakeMessages[Math.floor(Math.random() * fakeMessages.length)];

      statusText.innerText = randomMessage;
    }, 3500);
  </script>

</body>
</html>
